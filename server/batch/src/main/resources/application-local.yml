# 로컬 개발 프로필 — api 모듈과 동일한 docker-compose 환경을 바라본다.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/${DB_NAME:orderflow}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:orderflow}
    password: ${DB_PASSWORD:orderflow-local}
  jpa:
    hibernate:
      ddl-auto: update
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
