# 로컬 개발 프로필 — docker-compose 기본값과 일치. 실제 배포 환경 값은 환경변수로만 주입한다.
# 스키마는 수동 관리(ddl-auto: none — PM 2026-07-17). 적용 방법은 infra/src/main/resources/db/schema.sql 서두 참조.
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:13306}/${DB_NAME:orderflow}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:orderflow}
    password: ${DB_PASSWORD:orderflow-local}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
